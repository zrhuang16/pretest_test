<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>實驗問卷分配</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: Arial, "Microsoft JhengHei", sans-serif;
      background: #f4f6f8;
      color: #202124;
    }

    .card {
      width: 100%;
      max-width: 520px;
      padding: 40px 32px;
      text-align: center;
      background: white;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 26px;
    }

    p {
      line-height: 1.7;
      color: #5f6368;
    }

    .loader {
      width: 42px;
      height: 42px;
      margin: 28px auto;
      border: 5px solid #e8eaed;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    .error {
      color: #b3261e;
    }

    button {
      margin-top: 24px;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>正在分配實驗問卷</h1>

    <div class="loader" id="loader"></div>

    <p id="status">
      系統正在為您隨機分配問卷，請勿關閉此頁面。
    </p>

    <button id="retryButton" hidden>
      重新嘗試
    </button>
  </main>

  <script src="script.js"></script>
</body>
</html>
